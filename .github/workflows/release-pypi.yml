name: release-pypi

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag version to publish (example: v0.1.3)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve ref for manual run
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          git fetch --tags --force
          git checkout "refs/tags/${{ inputs.tag }}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build artifacts
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: dist/*

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build]
    environment:
      name: pypi
      url: https://pypi.org/project/waton/

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-all

      - name: Flatten artifacts into dist/
        shell: bash
        run: |
          mkdir -p dist
          find dist-all -type f \( -name "*.whl" -o -name "*.tar.gz" \) -exec cp {} dist/ \;
          ls -la dist

      - name: Publish package distributions to PyPI (Trusted Publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  github-release:
    name: Create/Update GitHub Release
    runs-on: ubuntu-latest
    needs: [publish]
    permissions:
      contents: write

    steps:
      - name: Resolve tag name
        id: tag
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate release notes body
        id: notes
        shell: bash
        run: |
          ver="${{ steps.tag.outputs.value }}"
          ver_no_v="${ver#v}"
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "## Waton ${ver} release" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "Published to PyPI:" >> "$GITHUB_OUTPUT"
          echo "- https://pypi.org/project/waton/${ver_no_v}/" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "Install:" >> "$GITHUB_OUTPUT"
          echo "\`\`\`bash" >> "$GITHUB_OUTPUT"
          echo "pip install waton==${ver_no_v}" >> "$GITHUB_OUTPUT"
          echo "\`\`\`" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "For full details, see CHANGELOG.md in this tag." >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create or update release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          tag="${{ steps.tag.outputs.value }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "${tag}" --notes "${{ steps.notes.outputs.body }}"
          else
            gh release create "$tag" --title "${tag}" --notes "${{ steps.notes.outputs.body }}"
          fi
